<div class="mb-3">
    <!-- Compact Wrapper Box (40px) -->
    <div class="flex items-center h-[40px] rounded-[18px] border-2 border-transparent focus-within:border-primary transition-all pl-4 pr-3 shadow-sm"
        [ngClass]="customClass ? customClass : (errorText ? 'border-red-100 bg-red-50/20' : 'bg-slate-50')">

        <!-- Left Icon -->
        <ion-icon *ngIf="iconName" [name]="iconName" [ngClass]="iconClass ? iconClass : 'text-[18px] text-primary mr-3'"
            class="shrink-0"></ion-icon>

        <!-- Right Content (Label + Select) -->
        <div class="flex-1 flex items-center min-w-0 h-full">
            <label *ngIf="label"
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2 shrink-0">{{ label
                }}:</label>
            <select
                class="w-full bg-transparent border-none outline-none focus:outline-none focus:ring-0 text-[14px] font-bold text-slate-800 h-full -ml-1 pr-6 truncate"
                [disabled]="disabled" [(ngModel)]="value" (ngModelChange)="onModelChange($event)" (blur)="onBlur()">
                <option value="" disabled *ngIf="placeholder">{{ placeholder }}</option>
                <option *ngFor="let opt of options" [ngValue]="opt.value">
                    {{ opt.label }}
                </option>
            </select>
        </div>

        <!-- Right Dropdown Icon -->
        <!-- <ion-icon name="chevron-down" class="text-[14px] text-slate-300 ml-1"></ion-icon> -->
    </div>

    <!-- Error Message -->
    <div class="px-4 mt-1 text-[10px] font-black text-rose-500 uppercase tracking-wider" *ngIf="errorText">
        {{ errorText }}
    </div>
</div>
