<div class="mb-3">
    <!-- Compact Wrapper Box (40px) -->
    <div (click)="openCalendar()"
        class="flex items-center h-[40px] rounded-[18px] border-2 border-transparent transition-all pl-4 pr-3 shadow-sm cursor-pointer active:scale-[0.98]"
        [ngClass]="customClass ? customClass : (isCalendarOpen ? 'bg-white border-primary' : (errorText ? 'border-red-100 bg-red-50/20' : 'bg-slate-50'))">

        <!-- Left Icon (Always show calendar or specified icon) -->
        <ion-icon [name]="iconName ? iconName : 'calendar'" class="text-[18px] text-primary mr-3 shrink-0"></ion-icon>

        <!-- Right Content (Label + Value) -->
        <div class="flex-1 flex items-center min-w-0 h-full">
            <label *ngIf="label"
                class="text-[10px] font-black text-slate-400 uppercase tracking-widest mr-2 shrink-0">{{ label
                }}:</label>
            <div class="text-[14px] font-bold text-slate-800 h-full flex items-center truncate">
                {{ value ? (value | date:'mediumDate') : placeholder }}
            </div>
        </div>
    </div>

    <!-- Modal Sheets for Date Selection -->
    <ion-modal [isOpen]="isCalendarOpen" (didDismiss)="isCalendarOpen = false" class="custom-sheet-modal"
        [breakpoints]="[0, 0.55]" [initialBreakpoint]="0.55">
        <ng-template>
            <div class="px-6 py-5 bg-white border-b border-slate-100 flex items-center justify-between">
                <h2 class="m-0 text-[18px] font-black text-slate-900">Select Date</h2>
                <button (click)="isCalendarOpen = false"
                    class="m-0 p-0 text-[14px] font-black text-primary bg-transparent border-0 cursor-pointer uppercase tracking-widest">Done</button>
            </div>

            <ion-content class="ion-padding" color="light">
                <div class="bg-white rounded-[24px] overflow-hidden shadow-inner">
                    <ion-datetime presentation="date" [value]="value" (ionChange)="onDateChange($event)"
                        class="w-full h-full font-bold" style="--background: #ffffff;"></ion-datetime>
                </div>
            </ion-content>
        </ng-template>
    </ion-modal>
</div>
