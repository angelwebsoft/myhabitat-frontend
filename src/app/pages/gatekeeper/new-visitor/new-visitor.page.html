<ion-header class="ion-no-border">
    <app-header title="New Visitor Entry" color="primary" [showBack]="true" defaultHref="/gatekeeper"></app-header>
</ion-header>

<ion-content class="bg-[#f8fafc]">
    <div class="px-5 pt-6 pb-20 animate__animated animate__fadeIn">
        <div class="mb-8">
            <h1 class="text-[24px] font-black text-slate-900 m-0">Visitor Registration</h1>
            <p class="text-[14px] font-medium text-slate-400 m-0 mt-1">Collect visitor details for entry authorization
            </p>
        </div>

        <app-common-card customClass="m-0 border-0 shadow-lg shadow-slate-200/50">
            <!-- Form Header Section -->
            <div class="flex items-center gap-4 mb-8">
                <div (click)="fileInput.click()"
                    class="h-[80px] w-[80px] rounded-[32px] bg-slate-50 border-2 border-dashed border-slate-200 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden group">
                    <img *ngIf="form.photoURL" [src]="form.photoURL"
                        class="h-full w-full object-cover rounded-[32px]" />
                    <ion-icon *ngIf="!form.photoURL" name="camera-outline"
                        class="text-[28px] text-slate-400 group-active:scale-95 transition-transform"></ion-icon>
                    <span *ngIf="!form.photoURL" class="text-[10px] font-bold text-slate-400 mt-1">PHOTO</span>
                    <input #fileInput type="file" (change)="onFileChange($event)" accept="image/*" class="hidden" />
                </div>
                <div class="flex-1">
                    <h2 class="text-[16px] font-extrabold text-slate-800 m-0">Visitor Profile</h2>
                    <p class="text-[12px] font-semibold text-slate-400 m-0">Please click to capture a photo if required.
                    </p>
                </div>
            </div>

            <!-- Form Inputs -->
            <div class="space-y-6">
                <app-common-input label="Visitor Full Name" placeholder="e.g. Rahul Sharma" iconName="person-outline"
                    [(ngModel)]="form.visitorName"></app-common-input>
                <app-common-input label="Mobile Number" placeholder="e.g. 9876543210" iconName="call-outline" type="tel"
                    [(ngModel)]="form.mobile"></app-common-input>
                <app-common-select label="Select Flat Number" iconName="home-outline" placeholder="Pick destination"
                    [options]="flatOptions" [(ngModel)]="form.flatNumber"></app-common-select>
                <app-common-input label="Purpose of Visit" placeholder="e.g. Delivery, Guest, Service"
                    iconName="document-text-outline" [(ngModel)]="form.purpose"></app-common-input>
            </div>

            <!-- Submit Button matching the theme -->
            <div slot="footer" class="w-full pt-10">
                <button (click)="onSubmit()" [disabled]="!isValid" [class.opacity-50]="!isValid"
                    class="w-full flex items-center justify-center gap-3 py-4 text-[16px] font-black text-black bg-[#22c55e] rounded-[24px] shadow-[0_12px_24px_-8px_rgba(34,197,94,0.5)] active:scale-[0.98] transition-all">
                    <ion-icon name="checkmark-circle" class="text-2xl"></ion-icon>
                    AUTHORIZE ENTRY
                </button>
            </div>
        </app-common-card>
    </div>
</ion-content>
