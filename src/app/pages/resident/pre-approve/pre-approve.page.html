<app-header title="Pre-Approve Guest" color="tertiary" [showBack]="true" defaultHref="/resident"></app-header>

<ion-content [style.--background]="'var(--ion-color-primary-light)'">
    <!-- Success State (QR Card) -->
    <div *ngIf="qrDataUrl" class="px-5 pt-10 pb-20 animate__animated animate__fadeIn">
        <div
            class="rounded-[32px] bg-white p-6 shadow-[0_20px_50px_rgba(15,23,42,0.1)] border border-slate-100 flex flex-col items-center text-center">
            <div class="h-16 w-16 bg-emerald-50 rounded-2xl flex items-center justify-center mb-6">
                <ion-icon name="checkmark-circle" class="text-3xl text-emerald-500"></ion-icon>
            </div>

            <h2 class="m-0 text-[22px] font-black text-slate-900">Request Approved!</h2>
            <p class="mt-2 text-[14px] font-bold text-slate-400">Please share this QR code with your guest.</p>

            <div class="mt-10 p-4 bg-white rounded-[28px] border-4 border-slate-50 shadow-inner">
                <img [src]="qrDataUrl" alt="Guest QR" class="h-[200px] w-[200px] rounded-2xl" />
            </div>

            <div class="mt-8 w-full space-y-3">
                <div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">GUEST</span>
                    <span class="text-[14px] font-black text-slate-800">{{ guest.visitorName }}</span>
                </div>
                <div class="p-4 bg-slate-50 rounded-2xl flex items-center justify-between">
                    <span class="text-[11px] font-black text-slate-400 uppercase tracking-widest">VALID DATE</span>
                    <span class="text-[14px] font-black text-slate-800">{{ guest.validDate | date:'mediumDate' }}</span>
                </div>
            </div>

            <button (click)="onDone()"
                class="mt-10 w-full h-14 bg-indigo-500 text-white rounded-[20px] font-black uppercase tracking-wider shadow-lg shadow-indigo-500/30 active:scale-95 transition-all outline-none border-0">
                DONE
            </button>
        </div>
    </div>

    <!-- Form State -->
    <ng-container *ngIf="!qrDataUrl">
        <!-- Top Info Panel -->
        <div class="bg-white p-5 rounded-b-[40px] shadow-[0_4px_20px_rgba(15,23,42,0.04)] border-b border-slate-50">
            <div class="h-14 w-14 bg-primary-20 rounded-[14px] flex items-center justify-center mb-6">
                <ion-icon name="paper-plane" class="text-3xl text-primary"></ion-icon>
            </div>
            <h1 class="m-0 text-[28px] font-black text-slate-900 leading-tight">Generate<br />Guest Pass</h1>
            <p class="mt-3 mb-0 text-[14px] font-bold text-slate-400">Pre-authorizing a guest saves time at the security
                gate.</p>
        </div>
        <div class="px-4">
            <div class="p-5 space-y-6 bg-white mt-4 rounded-xl">
                <div>
                    <ion-label class="mb-2 ml-1 block text-[13px] font-semibold text-slate-500">Guest Name</ion-label>
                    <app-common-input customClass="bg-primary-10" iconName="person" placeholder="Enter guest name"
                        [(ngModel)]="guest.visitorName"></app-common-input>
                </div>

                <div>
                    <ion-label class="mb-2 ml-1 block text-[13px] font-semibold text-slate-500">Mobile
                        Number</ion-label>
                    <app-common-input customClass="bg-primary-10" type="tel" iconName="call"
                        placeholder="Enter mobile number" [(ngModel)]="guest.mobile"></app-common-input>
                </div>

                <div>
                    <ion-label class="mb-2 ml-1 block text-[13px] font-semibold text-slate-500">Visit Date</ion-label>
                    <app-common-date customClass="bg-primary-10" iconName="calendar"
                        [(ngModel)]="guest.validDate"></app-common-date>
                </div>

                <button [disabled]="!isValid()" (click)="onSubmit()"
                    class="w-full h-15 flex items-center justify-center gap-3 bg-indigo-500 text-white rounded-[24px] font-black uppercase tracking-widest shadow-xl shadow-indigo-500/40 active:scale-95 transition-all outline-none border-0 disabled:opacity-50 disabled:grayscale disabled:scale-100 py-4 mt-6">
                    <ion-icon name="flash" class="text-xl"></ion-icon>
                    GENERATE PASS
                </button>
            </div>
        </div>
    </ng-container>
</ion-content>
