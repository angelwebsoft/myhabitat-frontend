<ion-header class="ion-no-border">
    <app-header title="Resident Home" color="tertiary" [showMenuButton]="true"></app-header>
</ion-header>

<ion-content [style.--background]="'var(--ion-color-primary-light)'">
    <!-- Common Dashboard Header -->
    <app-dashboard-header [user]="(currentUser$ | async) ?? null" role="resident" actionIcon="" label=""
        welcomeSubtitle="Manage your home access and visitors" searchPlaceholder="Search through visitor logs..."
        (action)="onPreApprove()"></app-dashboard-header>

    <!-- Quick Actions -->
    <div class="px-5 pt-8 grid grid-cols-2 gap-4">
        <div (click)="onPreApprove()"
            class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm active:scale-95 transition-all text-center">
            <div class="h-12 w-12 rounded-2xl bg-tertiary-light flex items-center justify-center mb-3 mx-auto">
                <ion-icon name="qr-code" class="text-2xl text-tertiary"></ion-icon>
            </div>
            <h3 class="text-[15px] font-black text-slate-800 m-0">Pre-Approve</h3>
            <p class="text-[10px] font-bold text-slate-400 m-0">Guest Entry</p>
        </div>

        <div (click)="onMaintenance()"
            class="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm active:scale-95 transition-all text-center">
            <div class="h-12 w-12 rounded-2xl bg-amber-50 flex items-center justify-center mb-3 mx-auto">
                <ion-icon name="receipt" class="text-2xl text-amber-500"></ion-icon>
            </div>
            <h3 class="text-[15px] font-black text-slate-800 m-0">Maintenance</h3>
            <p class="text-[10px] font-bold text-slate-400 m-0">Pay & View</p>
        </div>
    </div>

    <!-- Main List/Calendar area -->
    <h2 class="px-5 mt-10 mb-2 text-[18px] font-black text-slate-900 tracking-tight">Recent Visitors</h2>

    <visit-calendar [visitors]="(visitors$ | async) ?? []" emptyText="No visitors found for your flat yet."
        [showList]="true" (visitorClicked)="viewVisitorDetails($event)" (qrClicked)="showFullQr($event)"
        class="block"></visit-calendar>

    <!-- Native Fixed Floating Action Button (Matches Gatekeeper/Admin style) -->
    <button (click)="onPreApprove()" [style.bottom]="'calc(env(safe-area-inset-bottom, 0px) + 24px)'"
        class="fixed right-5 z-[99] flex h-[56px] w-[56px] items-center justify-center rounded-full bg-[var(--ion-color-tertiary)] shadow-[0_6px_16px_rgba(var(--ion-color-tertiary-rgb),0.4)] transition-transform active:scale-95 sm:bottom-8 sm:right-8 border-0"
        style="--border-radius: 50%;">
        <ion-icon name="add" class="text-[32px] text-white"></ion-icon>
    </button>

    <ion-modal [isOpen]="isDetailsModalOpen" (didDismiss)="isDetailsModalOpen = false" [breakpoints]="[0, 0.85]"
        [initialBreakpoint]="0.85" class="custom-sheet-modal">
        <ng-template>
            <app-common-visitor-details [visitor]="selectedVisitor" (qrClick)="showFullQr($event)"
                (close)="isDetailsModalOpen = false"></app-common-visitor-details>
        </ng-template>
    </ion-modal>
    <ion-modal [isOpen]="isQrModalOpen" (didDismiss)="isQrModalOpen = false" class="qr-fullview-modal">
        <ng-template>
            <div class="flex flex-col items-center justify-center h-full p-8 bg-slate-900/40 backdrop-blur-xl"
                (click)="isQrModalOpen = false">
                <div class="bg-white p-8 rounded-[48px] shadow-2xl animate__animated animate__zoomIn"
                    (click)="$event.stopPropagation()">
                    <app-common-qr [value]="qrTokenForLargeView" [size]="280"></app-common-qr>
                    <p class="mt-8 mb-2 text-center text-slate-400 font-bold tracking-widest uppercase text-[11px]">
                        ACCESS PASS</p>
                    <div class="text-center font-black text-slate-800 text-lg uppercase tracking-tight">{{
                        qrTokenForLargeView }}</div>
                </div>
                <button (click)="isQrModalOpen = false"
                    class="mt-12 h-14 w-14 rounded-full bg-white/20 text-white flex items-center justify-center border-0 cursor-pointer active:scale-90 transition-transform">
                    <ion-icon name="close" class="text-3xl"></ion-icon>
                </button>
            </div>
        </ng-template>
    </ion-modal>
</ion-content>
