<ion-header class="ion-no-border">
    <app-header title="Resident Home" color="tertiary" [showMenuButton]="true"></app-header>
</ion-header>

<ion-content [style.--background]="'var(--ion-color-primary-light)'">
    <!-- Common Dashboard Header -->
    <app-dashboard-header [user]="(currentUser$ | async) ?? null" role="resident" actionIcon="add" label=""
        welcomeSubtitle="Manage your home access and visitors" searchPlaceholder="Search through visitor logs..."
        (action)="onPreApprove()"></app-dashboard-header>

    <!-- Main List/Calendar area -->
    <h2 class="px-5 mt-6 mb-2 text-[18px] font-black text-slate-900 tracking-tight">Recent Visitors</h2>

    <visit-calendar [visitors]="(visitors$ | async) ?? []" emptyText="No visitors found for your flat yet."
        [showList]="true" class="block pb-32"></visit-calendar>
</ion-content>
